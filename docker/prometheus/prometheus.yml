global:
  scrape_interval: 5s

# Each job lists two targets: the host-run address (`mvn spring-boot:run`)
# and the container address (`docker compose up`) -- whichever is actually
# running shows "up" in /targets, the other harmlessly shows "down".
scrape_configs:
  - job_name: payment-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080", "payment-api:8080"]
  - job_name: saga-orchestrator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082", "saga-orchestrator:8082"]
  - job_name: fraud-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8083", "fraud-service:8083"]
  - job_name: funds-auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8084", "funds-auth-service:8084"]
  - job_name: ledger-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8085", "ledger-service:8085"]
  - job_name: settlement-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8086", "settlement-service:8086"]
  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8087", "notification-service:8087"]
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8088", "api-gateway:8088"]
