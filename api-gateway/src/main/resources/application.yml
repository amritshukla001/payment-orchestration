server:
  port: 8088

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173,http://localhost:4173"
            allowedMethods: "GET,POST,OPTIONS"
            allowedHeaders: "*"
      routes:
        # POST /payments only -- rate-limited (the client-facing write that
        # actually costs money/resources to process through the saga).
        - id: payment-api-create
          uri: http://localhost:8080
          predicates:
            - Path=/payments
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@apiKeyResolver}"
        # Reads -- cheap and idempotent, no rate limit.
        - id: payment-api-reads
          uri: http://localhost:8080
          predicates:
            - Path=/payments/**
        - id: saga-orchestrator
          uri: http://localhost:8082
          predicates:
            - Path=/api/sagas/**
        - id: ledger-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/ledger/**
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/notifications/**

payflow:
  security:
    api-key: ${PAYFLOW_API_KEY:local-dev-api-key-change-me}

management:
  endpoint:
    # Disabled by default even when exposed -- exposure.include only
    # controls visibility, not whether the endpoint bean is created.
    gateway:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
