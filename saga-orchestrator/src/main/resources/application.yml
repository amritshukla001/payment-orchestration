server:
  port: 8082

spring:
  application:
    name: saga-orchestrator

  datasource:
    url: jdbc:postgresql://localhost:5432/orchestrator
    username: payflow
    password: payflow

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

resilience4j:
  retry:
    instances:
      kafka-consumer:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2

payflow:
  security:
    api-key: ${PAYFLOW_API_KEY:local-dev-api-key-change-me}
