server:
  port: 8084

spring:
  application:
    name: funds-auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/fundsauth
    username: payflow
    password: payflow

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health,info
