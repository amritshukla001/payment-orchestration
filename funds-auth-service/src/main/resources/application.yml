server:
  port: 8084

spring:
  application:
    name: funds-auth-service

  datasource:
    url: jdbc:postgresql://localhost:5432/fundsauth
    username: payflow
    password: payflow

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 500ms
      # Only spring.cache/@Cacheable is used here (accountBalances), not
      # Spring Data Redis's repository abstraction -- without this, startup
      # logs a spurious "could not safely identify store assignment"
      # warning for every existing JPA repository in this service.
      repositories:
        enabled: false

  cache:
    type: redis

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

resilience4j:
  retry:
    instances:
      kafka-consumer:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      account-balance-cache:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
